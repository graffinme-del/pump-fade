<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>◈ PUMP FADE v5</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#f1f5f9;--s1:#fff;--s2:#f8fafc;--s3:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--text2:#334155;--muted:#64748b;--dim:#94a3b8;
  --red:#dc2626;--red-bg:#fef2f2;--red-b:#fecaca;
  --green:#16a34a;--green-bg:#f0fdf4;--green-b:#bbf7d0;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-b:#fde68a;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-b:#bfdbfe;
  --violet:#7c3aed;--sky:#0369a1;--orange:#ea580c;
  --topbar:#1e293b;--mono:'JetBrains Mono','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:12px;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
button{cursor:pointer;border:none;font-family:inherit;transition:all .12s;background:transparent;}
button:hover{opacity:.85;}button:active{transform:scale(.97);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes slideUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes pump-glow{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.3)}50%{box-shadow:0 0 0 5px rgba(245,158,11,0)}}
@keyframes sig-pulse{0%,100%{border-color:var(--red-b)}50%{border-color:var(--red)}}
@keyframes live-glow{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.4)}50%{box-shadow:0 0 0 4px rgba(74,222,128,0)}}
@keyframes blink-red{0%,100%{background:var(--red-bg)}50%{background:#fee2e2}}
@keyframes dot-blink{0%,100%{opacity:1}50%{opacity:.15}}
.fade{animation:slideUp .2s ease;}
.sig-pulse{animation:sig-pulse 2s infinite;}
.blink{animation:blink-red 1s infinite;}

/* TOPBAR */
#topbar{background:var(--topbar);height:42px;display:flex;align-items:center;padding:0 14px;gap:10px;border-bottom:2px solid #334155;flex-shrink:0;z-index:1000;}
.logo{font-family:var(--mono);font-size:13px;font-weight:700;color:#f59e0b;letter-spacing:2px;}
.tdiv{width:1px;height:18px;background:#334155;flex-shrink:0;}
#status-dot{width:7px;height:7px;border-radius:50%;background:#64748b;transition:all .3s;flex-shrink:0;}
#status-dot.live{background:#4ade80;animation:live-glow 2s infinite;}
#status-dot.scanning{background:#f59e0b;animation:pulse .6s infinite;}
#status-text{font-family:var(--mono);font-size:10px;font-weight:700;color:#94a3b8;}
#status-text.live{color:#4ade80;}
#status-text.scanning{color:#f59e0b;}
.top-price{font-family:var(--mono);font-size:20px;font-weight:700;color:#f8fafc;}
.pump-thresh{display:flex;align-items:center;gap:5px;font-size:10px;color:#94a3b8;}
.pump-thresh input[type=range]{width:65px;accent-color:#f59e0b;}
.thresh-val{font-family:var(--mono);color:#f59e0b;font-weight:700;min-width:28px;}
.top-btn{font-size:9px;color:#94a3b8;border:1px solid #334155;padding:2px 8px;border-radius:2px;background:transparent;}
.top-btn:hover{color:#f8fafc;border-color:#475569;}

/* ALERTS */
#pump-alert{display:none;padding:5px 14px;background:var(--amber-bg);border-bottom:2px solid var(--amber);font-size:11px;font-weight:700;color:#92400e;align-items:center;gap:8px;flex-shrink:0;animation:pump-glow 1.5s infinite;}
#alert-bar{display:none;padding:7px 14px;font-weight:700;font-size:12px;align-items:center;gap:10px;border-bottom:2px solid transparent;flex-shrink:0;}

/* GRID LAYOUT */
#workspace{flex:1;min-height:0;position:relative;overflow:hidden;padding:6px;gap:6px;display:grid;}

/* PANELS */
.panel{background:var(--s1);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;position:relative;min-width:120px;min-height:80px;}
.panel-header{padding:5px 8px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-shrink:0;cursor:move;user-select:none;}
.panel-title{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.5px;flex:1;}
.panel-body{flex:1;overflow-y:auto;overflow-x:hidden;}
.panel-resize{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:se-resize;background:linear-gradient(135deg,transparent 50%,var(--border2) 50%);border-radius:0 0 5px 0;opacity:.5;}
.panel-resize:hover{opacity:1;}
.panel.dragging{opacity:.7;z-index:100;}
.panel.drag-over{outline:2px dashed var(--red);}

/* DROP ZONES */
.drop-zone{position:absolute;border:2px dashed transparent;border-radius:6px;transition:all .15s;pointer-events:none;z-index:50;}
.drop-zone.active{border-color:var(--blue);background:rgba(37,99,235,.06);}

/* IDEAS */
.ideas-hd{padding:6px 9px;border-bottom:1px solid var(--border);background:var(--s2);flex-shrink:0;}
.ideas-hd-row{display:flex;justify-content:space-between;align-items:center;}
.col-title{font-size:10px;font-weight:700;color:#475569;letter-spacing:1px;text-transform:uppercase;}
.scan-btn{font-size:9px;color:var(--sky);border:1px solid var(--blue-b);padding:2px 7px;border-radius:2px;background:var(--blue-bg);}
.col-sub{font-size:8px;color:var(--dim);margin-top:1px;}
.idea-card{border:1px solid var(--border);border-radius:5px;padding:7px 8px;margin-bottom:4px;cursor:pointer;transition:all .15s;background:var(--s1);position:relative;}
.idea-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);}
.idea-card.long{border-left:3px solid var(--green);}
.idea-card.short{border-left:3px solid var(--red);}
.idea-card.pump-new{border-left:3px solid var(--amber);background:linear-gradient(135deg,#fffbeb,#fff);animation:pump-glow 1.8s infinite;}
.idea-card.active{box-shadow:0 2px 10px rgba(0,0,0,.12);}
.idea-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.idea-sym{font-family:var(--mono);font-size:12px;font-weight:700;}
.idea-dir{font-size:8px;font-weight:700;padding:1px 4px;border-radius:2px;}
.idea-dir.long{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b);}
.idea-dir.short{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b);}
.idea-dir.pump{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b);}
.conf-bar{height:2px;background:var(--s3);border-radius:1px;margin:3px 0;}
.conf-fill{height:100%;border-radius:1px;}
.idea-meta{font-size:9px;color:var(--muted);display:flex;gap:5px;flex-wrap:wrap;}
.idea-sub{font-size:8px;color:var(--dim);margin-top:1px;}
.idea-age{font-size:8px;color:var(--dim);margin-top:1px;}
.new-badge{position:absolute;top:4px;right:4px;background:var(--red);color:white;font-size:7px;font-weight:700;padding:1px 4px;border-radius:8px;}

/* CHART */
.chart-panel-hd{padding:4px 8px;border-bottom:1px solid var(--border);background:var(--s2);display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap;}
.chart-tf{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text2);}
.chart-emas{display:flex;gap:5px;font-size:7px;}
.chart-wrap{flex:1;min-height:0;position:relative;}

/* VOLATILITY */
.vol-item{display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:3px;margin-bottom:3px;background:var(--s1);border:1px solid #f1f5f9;cursor:pointer;}
.vol-item:hover{background:var(--s2);}
.vol-rank{font-size:9px;min-width:14px;font-weight:700;color:var(--dim);}
.vol-sym{font-family:var(--mono);font-size:11px;font-weight:700;flex:1;}
.vol-bar-wrap{width:36px;height:4px;background:var(--s3);border-radius:2px;}
.vol-bar-fill{height:100%;border-radius:2px;}
.vol-chg{font-size:9px;font-weight:700;}
.itab{transition:all .12s;}
.itab:hover{opacity:.8;}
.itab.active{border-bottom:2px solid var(--red)!important;color:var(--red)!important;}
.itab-badge{display:inline-block;background:var(--s3);border-radius:8px;padding:0 4px;font-size:8px;font-weight:700;margin-left:2px;}

/* SIGNAL / ANALYSIS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:8px;}
.card-title{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.kv{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px;}
.kv .key{color:var(--muted);}
.kv .val{font-family:var(--mono);font-size:12px;font-weight:700;}
.sig-row{display:flex;gap:6px;align-items:center;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);}
.signal-card{background:var(--s1);border:1px solid var(--red-b);border-radius:5px;padding:11px;margin-bottom:8px;}
.sig-title{font-family:var(--mono);font-size:13px;font-weight:800;margin-bottom:3px;}
.sig-sub{font-size:9px;color:var(--dim);margin-bottom:7px;}
.sig-kv{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px;}
.sig-k{color:var(--muted);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.sig-v{font-family:var(--mono);font-weight:700;font-size:12px;}
.open-btn{display:block;width:100%;padding:9px;text-align:center;border-radius:3px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;border:none;font-family:inherit;}
.detail-card{background:var(--s1);border:1px solid var(--border);border-radius:5px;padding:11px;margin-bottom:8px;}
.detail-hd{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.detail-sym{font-family:var(--mono);font-size:15px;font-weight:800;}
.why-box{border-radius:4px;padding:7px 9px;margin-bottom:7px;font-size:11px;line-height:1.7;}
.why-box b{display:block;font-size:8px;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
.levels-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:7px;}
.level-box{background:var(--s2);border:1px solid var(--border);border-radius:3px;padding:5px 7px;}
.level-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);}
.level-val{font-family:var(--mono);font-size:13px;font-weight:700;}
.stats-row{display:flex;gap:10px;margin:7px 0;flex-wrap:wrap;}
.stat-item .sl{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
.stat-item .sv{font-family:var(--mono);font-weight:700;font-size:13px;}
.trinity-box{background:var(--blue-bg);border:1px solid var(--blue-b);border-radius:4px;padding:7px 9px;font-size:10px;line-height:1.7;color:#1e40af;}
.trinity-box b{font-size:8px;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:2px;}

/* PHASE TABS */
.ptabs{display:flex;border-bottom:2px solid var(--border);flex-shrink:0;padding:0 4px;overflow-x:auto;background:var(--s1);}
.ptab{padding:6px 8px;font-size:9px;font-weight:700;color:var(--dim);border-bottom:3px solid transparent;cursor:pointer;display:flex;align-items:center;gap:3px;margin-bottom:-2px;white-space:nowrap;}
.ptab:hover{color:var(--text2);}
.ptab.done{color:var(--green);}
.ptab.active{color:var(--red);border-bottom-color:var(--red);}
.ptab-dot{width:5px;height:5px;border-radius:50%;}

/* WINRATE */
.wr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px;}
.wr-box{background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:7px;text-align:center;}
.wr-v{font-family:var(--mono);font-size:17px;font-weight:800;}
.wr-l{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}
.wr-item{background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:4px 7px;margin-bottom:3px;display:flex;align-items:center;gap:5px;border-left:3px solid var(--border);font-size:10px;}
.wr-item.win{border-left-color:var(--green);}
.wr-item.loss{border-left-color:var(--red);}
.wr-item.pend{border-left-color:var(--amber);}

/* CHAT */
.chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:0;}
.msg-user{background:var(--red-bg);border:1px solid var(--red-b);border-radius:6px;padding:8px 10px;font-size:11px;align-self:flex-end;max-width:92%;line-height:1.6;}
.msg-ai{background:var(--blue-bg);border:1px solid var(--blue-b);border-radius:6px;padding:9px 11px;font-size:11px;color:var(--text2);line-height:1.75;}
.msg-ai-hd{font-size:9px;color:var(--blue);font-weight:700;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.msg-thinking{background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:11px;color:var(--muted);animation:pulse 1s infinite;}
.qbtns{padding:5px 8px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px;flex-shrink:0;background:var(--s2);}
.qbtn{background:var(--s3);border:1px solid var(--border);color:var(--muted);padding:3px 8px;border-radius:10px;font-size:9px;cursor:pointer;font-family:inherit;}
.qbtn:hover{background:var(--blue-bg);border-color:var(--blue-b);color:var(--blue);}
.chat-input-row{padding:8px;border-top:1px solid var(--border);display:flex;gap:5px;flex-shrink:0;}
#chat-input{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:3px;padding:6px 8px;font-size:11px;font-family:inherit;color:var(--text);resize:none;height:48px;outline:none;}
.chat-send{background:var(--red);color:white;border-radius:3px;padding:0 12px;font-size:15px;font-weight:700;align-self:stretch;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">◈ PUMP FADE</div>
  <div class="tdiv"></div>
  <div style="display:flex;align-items:center;gap:5px;">
    <div id="status-dot"></div>
    <span id="status-text">CONNECTING</span>
    <span id="refresh-timer" style="font-size:9px;color:#475569;font-family:var(--mono);"></span>
  </div>
  <div class="pump-thresh">
    Порог:
    <input type="range" min="5" max="30" value="15" id="thresh-slider" oninput="onThreshChange(this.value)">
    <span class="thresh-val" id="thresh-val">15%</span>
  </div>
  <div style="flex:1"></div>
  <button class="top-btn" onclick="resetLayout()" title="Сбросить layout">⊞ Сброс</button>
  <button class="top-btn" onclick="saveLayout()" title="Сохранить layout">💾 Сохранить</button>
  <div class="tdiv"></div>
  <span id="sym-label" style="font-size:10px;color:#94a3b8;"></span>
  <span class="top-price" id="price-display">—</span>
  <span id="change-display" style="font-size:11px;font-weight:700;">—</span>
  <span id="entry-badge" style="display:none;background:rgba(220,38,38,.2);border:1px solid var(--red);color:#fca5a5;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:700;font-family:var(--mono);">▼ ВХОД</span>
</div>
<div id="pump-alert">
  <span id="pump-alert-text">🔥</span>
  <button onclick="document.getElementById('pump-alert').style.display='none'" style="margin-left:auto;background:#92400e;color:white;border:none;border-radius:3px;padding:2px 7px;font-size:9px;cursor:pointer;">✕</button>
</div>
<div id="alert-bar"></div>

<!-- WORKSPACE -->
<div id="workspace"></div>

<script>
// ═══════════════════════════════════════════════════════
//  GRID LAYOUT ENGINE
// ═══════════════════════════════════════════════════════
const LAYOUT_KEY = 'pf_layout_v5';

// Default panel config: {id, title, col, row, w, h (in grid units)}
const DEFAULT_PANELS = [
  {id:'ideas',    title:'💡 Идеи агента', col:1,  row:1,  w:3, h:9},
  {id:'vol',      title:'⚡ Волатильность',col:1,  row:10, w:3, h:9},
  {id:'chart1h',  title:'📈 1H',          col:4,  row:1,  w:7, h:6},
  {id:'chart15m', title:'📉 15M',         col:4,  row:7,  w:7, h:5},
  {id:'cvd',      title:'CVD',            col:4,  row:12, w:4, h:3},
  {id:'volume',   title:'Volume',         col:8,  row:12, w:3, h:3},
  {id:'analysis', title:'🔍 Фазы',        col:11, row:1,  w:4, h:8},
  {id:'chat',     title:'💬 AI Советник', col:11, row:9,  w:4, h:9},
  {id:'data',     title:'📊 Данные',      col:1,  row:15, w:3, h:4},
];

const GRID_COLS = 14;
const GRID_ROWS = 18;

let panels = [];
let dragState = null;
let resizeState = null;

function loadLayout() {
  try {
    const saved = localStorage.getItem(LAYOUT_KEY);
    return saved ? JSON.parse(saved) : DEFAULT_PANELS;
  } catch { return DEFAULT_PANELS; }
}

function saveLayout() {
  const config = panels.map(p => ({
    id: p.id, title: p.title,
    col: parseInt(p.el.style.gridColumnStart),
    row: parseInt(p.el.style.gridRowStart),
    w: parseInt(p.el.style.gridColumnEnd) - parseInt(p.el.style.gridColumnStart),
    h: parseInt(p.el.style.gridRowEnd) - parseInt(p.el.style.gridRowStart),
  }));
  localStorage.setItem(LAYOUT_KEY, JSON.stringify(config));
  showToast('Layout сохранён ✓');
}

function resetLayout() {
  localStorage.removeItem(LAYOUT_KEY);
  buildWorkspace(DEFAULT_PANELS);
  showToast('Layout сброшен ✓');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#1e293b;color:#f8fafc;padding:8px 14px;border-radius:6px;font-size:11px;font-weight:600;z-index:9999;animation:slideUp .2s ease;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function buildWorkspace(config) {
  const ws = document.getElementById('workspace');
  ws.innerHTML = '';
  ws.style.gridTemplateColumns = `repeat(${GRID_COLS}, 1fr)`;
  ws.style.gridTemplateRows = `repeat(${GRID_ROWS}, 1fr)`;
  panels = [];

  config.forEach(cfg => {
    const el = document.createElement('div');
    el.className = 'panel';
    el.dataset.panelId = cfg.id;
    el.style.gridColumn = `${cfg.col} / ${cfg.col + cfg.w}`;
    el.style.gridRow = `${cfg.row} / ${cfg.row + cfg.h}`;
    el.innerHTML = buildPanelHTML(cfg);
    ws.appendChild(el);
    panels.push({id: cfg.id, el, title: cfg.title});

    // Drag from header
    const hdr = el.querySelector('.panel-header');
    if (hdr) {
      hdr.addEventListener('mousedown', e => startDrag(e, el));
    }
    // Resize from corner
    const rsz = el.querySelector('.panel-resize');
    if (rsz) {
      rsz.addEventListener('mousedown', e => { e.stopPropagation(); startResize(e, el); });
    }
  });

  // Init chart panels after DOM ready
  setTimeout(() => {
    redrawAllCharts();
    initChatPanel();
  }, 200);
}

function buildPanelHTML(cfg) {
  const hideResize = '';
  const base = `<div class="panel-header"><span class="panel-title">${cfg.title}</span><div style="display:flex;gap:4px;"><button onclick="togglePanel('${cfg.id}')" style="font-size:10px;color:var(--dim);padding:0 4px;" title="Свернуть">—</button></div></div>`;
  const resize = `<div class="panel-resize" title="Изменить размер"></div>`;

  switch(cfg.id) {
    case 'ideas': return base + `
      <div class="ideas-hd">
        <div class="ideas-hd-row">
          <span class="col-title" id="scanner-label">💡 Идеи агента</span>
          <div style="display:flex;align-items:center;gap:4px;">
            <span id="ideas-count" style="font-size:9px;color:var(--muted);"></span>
            <button class="scan-btn" onclick="runIdeas(true)" id="scan-main-btn">↻</button>
          </div>
        </div>
        <div class="col-sub" style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">
          min <span id="min-conf-label">65</span>%
          <input type="range" min="45" max="85" value="65" id="conf-slider" oninput="document.getElementById('min-conf-label').textContent=this.value;renderAllIdeas()" style="width:45px;accent-color:var(--red);vertical-align:middle;">
        </div>
      </div>
      <!-- Idea type tabs -->
      <div style="display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--s2);">

// ═══════════════════════════════════════════════════════
//  DRAG & DROP
// ═══════════════════════════════════════════════════════
function startDrag(e, el) {
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
  e.preventDefault();
  const ws = document.getElementById('workspace');
  const wsRect = ws.getBoundingClientRect();
  const elRect = el.getBoundingClientRect();
  const colW = wsRect.width / GRID_COLS;
  const rowH = (wsRect.height) / GRID_ROWS;
  const offsetX = e.clientX - elRect.left;
  const offsetY = e.clientY - elRect.top;

  // Store original grid position
  const origCol = el.style.gridColumnStart;
  const origRow = el.style.gridRowStart;
  const curW = parseInt(el.style.gridColumnEnd) - parseInt(el.style.gridColumnStart);
  const curH = parseInt(el.style.gridRowEnd) - parseInt(el.style.gridRowStart);

  dragState = { el, offsetX, offsetY, colW, rowH, wsRect, origCol, origRow, curW, curH };
  el.style.opacity = '0.4';

  // Ghost follows cursor
  const ghost = document.createElement('div');
  ghost.id = 'drag-ghost';
  ghost.style.cssText = `position:fixed;opacity:0.85;pointer-events:none;z-index:9999;width:${elRect.width}px;height:${elRect.height}px;left:${elRect.left}px;top:${elRect.top}px;border:2px solid var(--red);border-radius:6px;background:var(--s1);box-shadow:0 8px 24px rgba(0,0,0,.15);`;
  ghost.innerHTML = `<div style="padding:8px;font-size:11px;font-weight:700;color:var(--text2);">${el.querySelector('.panel-title')?.textContent || el.querySelector('.chart-tf')?.textContent || '...'}</div>`;
  document.body.appendChild(ghost);

  // Show grid overlay
  showGridOverlay(wsRect, colW, rowH);

  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', endDrag);
}

function showGridOverlay(wsRect, colW, rowH) {
  let ov = document.getElementById('grid-overlay');
  if (!ov) { ov = document.createElement('div'); ov.id = 'grid-overlay'; document.getElementById('workspace').appendChild(ov); }
  ov.style.cssText = `position:absolute;inset:0;pointer-events:none;z-index:50;`;
  let html = '';
  for (let c = 1; c <= GRID_COLS; c++) {
    for (let r = 1; r <= GRID_ROWS; r++) {
      html += `<div style="position:absolute;left:${(c-1)/GRID_COLS*100}%;top:${(r-1)/GRID_ROWS*100}%;width:${1/GRID_COLS*100}%;height:${1/GRID_ROWS*100}%;border:1px solid rgba(37,99,235,.15);border-radius:2px;"></div>`;
    }
  }
  ov.innerHTML = html;
}

function hideGridOverlay() {
  const ov = document.getElementById('grid-overlay');
  if (ov) ov.remove();
}

function onDrag(e) {
  if (!dragState) return;
  const ghost = document.getElementById('drag-ghost');
  if (ghost) {
    ghost.style.left = (e.clientX - dragState.offsetX) + 'px';
    ghost.style.top = (e.clientY - dragState.offsetY) + 'px';
  }
  // Highlight target cell
  const { wsRect, colW, rowH } = dragState;
  const relX = e.clientX - dragState.offsetX - wsRect.left;
  const relY = e.clientY - dragState.offsetY - wsRect.top;
  const snapCol = Math.max(1, Math.min(GRID_COLS, Math.round(relX / colW) + 1));
  const snapRow = Math.max(1, Math.min(GRID_ROWS, Math.round(relY / rowH) + 1));
  if (ghost) ghost.dataset.col = snapCol;
}

function endDrag(e) {
  if (!dragState) return;
  const { el, colW, rowH, wsRect, curW, curH } = dragState;
  const ghost = document.getElementById('drag-ghost');
  if (ghost) ghost.remove();
  el.style.opacity = '';
  hideGridOverlay();

  // Snap position to grid
  const newLeft = e.clientX - dragState.offsetX - wsRect.left;
  const newTop  = e.clientY - dragState.offsetY - wsRect.top;
  let newCol = Math.round(newLeft / colW) + 1;
  let newRow = Math.round(newTop  / rowH) + 1;
  newCol = Math.max(1, Math.min(GRID_COLS - curW + 1, newCol));
  newRow = Math.max(1, Math.min(GRID_ROWS - curH + 1, newRow));

  el.style.gridColumn = `${newCol} / ${newCol + curW}`;
  el.style.gridRow    = `${newRow} / ${newRow + curH}`;

  dragState = null;
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', endDrag);
  setTimeout(redrawAllCharts, 100);
}

// ═══════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════
function startResize(e, el) {
  e.preventDefault();
  const ws = document.getElementById('workspace');
  const wsRect = ws.getBoundingClientRect();
  const colW = wsRect.width / GRID_COLS;
  const rowH = wsRect.height / GRID_ROWS;
  const startCol = parseInt(el.style.gridColumnStart);
  const startRow = parseInt(el.style.gridRowStart);

  resizeState = { el, startX: e.clientX, startY: e.clientY, colW, rowH, startCol, startRow, wsRect };
  document.addEventListener('mousemove', onResize);
  document.addEventListener('mouseup', endResize);
}

function onResize(e) {
  if (!resizeState) return;
  const { el, startX, startY, colW, rowH, startCol, startRow, wsRect } = resizeState;
  const curEndX = e.clientX - wsRect.left;
  const curEndY = e.clientY - wsRect.top;
  let newEndCol = Math.round(curEndX / colW) + 1;
  let newEndRow = Math.round(curEndY / rowH) + 1;
  newEndCol = Math.max(startCol + 2, Math.min(GRID_COLS + 1, newEndCol));
  newEndRow = Math.max(startRow + 2, Math.min(GRID_ROWS + 1, newEndRow));
  el.style.gridColumn = `${startCol} / ${newEndCol}`;
  el.style.gridRow = `${startRow} / ${newEndRow}`;
}

function endResize(e) {
  if (!resizeState) return;
  resizeState = null;
  document.removeEventListener('mousemove', onResize);
  document.removeEventListener('mouseup', endResize);
  setTimeout(redrawAllCharts, 100);
}

function ema(arr, p) {
  const k = 2/(p+1); const out = []; let prev = null; const init = [];
  for (let i=0; i<arr.length; i++) {
    if (arr[i]==null) { out.push(null); continue; }
    if (prev==null) {
      init.push(arr[i]);
      if (init.length < p) { out.push(null); continue; }
      prev = init.reduce((a,b)=>a+b,0)/p; out.push(prev); continue;
    }
    prev = arr[i]*k + prev*(1-k); out.push(prev);
  }
  return out;
}
function rsi(c, p=14) {
  const r = Array(p).fill(null); let ag=0, al=0;
  for (let i=1; i<=p; i++) { const d=c[i]-c[i-1]; d>=0?ag+=d:al-=d; }
  ag/=p; al/=p; r.push(al===0?100:100-100/(1+ag/al));
  for (let i=p+1; i<c.length; i++) {
    const d = c[i]-c[i-1];
    ag=(ag*(p-1)+(d>0?d:0))/p; al=(al*(p-1)+(d<0?-d:0))/p;
    r.push(al===0?100:100-100/(1+ag/al));
  }
  return r;
}
function macd(c) {
  const f=ema(c,12), s=ema(c,26);
  const ml = c.map((_,i)=>f[i]!=null&&s[i]!=null?f[i]-s[i]:null);
  const valid = ml.filter(v=>v!=null); const sr = ema(valid,9);
  let si=0; const sig = ml.map(v=>v!=null?sr[si++]:null);
  const h = ml.map((v,i)=>v!=null&&sig[i]!=null?v-sig[i]:null);
  return {ml,sig,h};
}
function atrCalc(cds, p=14) {
  const trs = cds.slice(1).map((c,i)=>Math.max(c.high-c.low,Math.abs(c.high-cds[i].close),Math.abs(c.low-cds[i].close)));
  return trs.slice(-p).reduce((s,v)=>s+v,0)/p;
}
function cvdFromCandles(cds) {
  let cum = 0;
  return cds.map(c=>{ const b=c.close-c.open; const r=c.high-c.low||0.0001; cum+=(b/r)*c.volume; return cum; });
}
function fmt(n, d=2) {
  if (n==null) return '—';

}

}

const LWC = {};

    layout: { background:{color:'#ffffff'}, textColor:'#334155', fontSize:10 },

  });
  const ro = new ResizeObserver(() => {
    if (LWC[id]) LWC[id].chart.applyOptions({ width: el.clientWidth, height: el.clientHeight });
  });
  ro.observe(el);
  LWC[id] = { chart, ro, series:{} };
  return chart;
}

function destroyChart(id) {

function cdsToLW(cds) {

function emaToLW(cds, arr) {

  const now = Math.floor(Date.now()/1000), step = 15*60;
  const d = data.map((v,i) => ({ time: now-(data.length-1-i)*step, value:v }));
  const s = chart.addLineSeries({color:falling?'#dc2626':'#16a34a',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  s.setData(d); lw.series.cvd = s;
  chart.timeScale().fitContent();
}

function drawVolume(cds) {
  if (!cds || cds.length < 5) return;
  const chart = getChart('vol-chart'); if (!chart) return;
  const lw = LWC['vol-chart'];
  ['vol','vema'].forEach(k => { if(lw.series[k]){try{chart.removeSeries(lw.series[k]);}catch{} delete lw.series[k];} });
  const hs = chart.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'volume',scaleMargins:{top:0.1,bottom:0}});
  hs.setData(cds.map(c => ({time:Math.floor(c.time/1000),value:c.volume,color:c.close>=c.open?'rgba(22,163,74,.45)':'rgba(220,38,38,.4)'})));
  lw.series.vol = hs;
  const ve = ema(cds.map(c=>c.volume), 20);
  const ls = chart.addLineSeries({color:'#d97706',lineWidth:1.2,priceScaleId:'volume',priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  ls.setData(emaToLW(cds, ve));
  lw.series.vema = ls;
  chart.timeScale().fitContent();
}

function redrawAllCharts() {
  setTimeout(() => {
    if (S.cds1h.length) drawCandles('chart1h', S.cds1h, S.analysis?.readyToShort ? S.analysis : null);
    if (S.cds15m.length) drawCandles('chart15m', S.cds15m, S.analysis?.readyToShort ? S.analysis : null);
    if (S.cvdData.length) drawCVD(S.cvdData);
    if (S.cds1h.length) drawVolume(S.cds1h);
  }, 100);
}

// ═══════════════════════════════════════════════════════
//  PUMP EXHAUSTION ANALYSIS
// ═══════════════════════════════════════════════════════
function analyzeFull(cds1h, cds15m, cds4h, oiTrend, frData) {
  if (!cds1h||cds1h.length<50||!cds15m||cds15m.length<30) return null;
  const c1h=cds1h.map(c=>c.close), v1h=cds1h.map(c=>c.volume);
  const n1h=cds1h.length-1;
  const e20_1h=ema(c1h,20), e50_1h=ema(c1h,50);
  const ve20=ema(v1h,20);
  const price=c1h[n1h], e20n=e20_1h[n1h], e50n=e50_1h[n1h];
  const distE20=e20n?(price-e20n)/e20n*100:0;

  // PUMP SPEED — compare per-candle rate
  const pumpLow=Math.min(...cds1h.slice(-8).map(c=>c.low));
  const pumpPct=pumpLow>0?(price-pumpLow)/pumpLow*100:0;
  const pump2=Math.min(...cds1h.slice(-2).map(c=>c.low));
  const pumpSpeed=pump2>0?(price-pump2)/pump2*100:0; // last 2 candles

  // Historical ATR for context
  const atrNow=atrCalc(cds1h);
  const atrHist=atrCalc(cds1h.slice(0,-1));
  const atrRatio=atrHist>0?atrNow/atrHist:1;

  const volNow=v1h[n1h], volAvg=ve20[n1h]||1;
  const volRatio=volNow/volAvg;
  const isPumped=pumpPct>=PUMP_THRESH&&distE20>=8;
  const isOverheated=distE20>15;

  // RSI
  const rsi1h=rsi(c1h); const rsiNow1h=rsi1h[n1h];
  const {ml:ml1h,h:h1h}=macd(c1h);
  const hNow1h=h1h[n1h], hPrev1h=h1h[n1h-1];

  // Upper wick ratio
  const last5=cds1h.slice(-5);
  const avgWick=last5.reduce((s,c)=>{
    const wick=c.high-Math.max(c.open,c.close);
    const body=Math.abs(c.close-c.open)||0.0001;
    return s+wick/body;
  },0)/5;

  // RSI divergence
  const rsiDiv=c1h[n1h]>c1h[n1h-3]&&rsi1h[n1h]<rsi1h[n1h-3]&&rsiNow1h>60;
  const macdTurning=hNow1h!=null&&hPrev1h!=null&&hNow1h<hPrev1h&&hPrev1h>0&&ml1h[n1h]>0;
  const volFading=volRatio<0.7&&pumpPct>PUMP_THRESH/2;

  // CVD divergence from 15m
  const cvd15=cvdFromCandles(cds15m);
  const cvdNow=cvd15[cvd15.length-1];
  const cvdPrev=cvd15[Math.max(0,cvd15.length-6)];
  const cvdFalling=cvdNow<cvdPrev;
  // Delta Exhaustion: price higher but CVD lower
  const c15=cds15m.map(c=>c.close); const n15=cds15m.length-1;
  const cvdDiv=c15[n15]>c15[n15-4]&&cvdNow<cvd15[Math.max(0,n15-4)];

  // OI Acceleration
  const oiAccel = S.oiHist.length>=3
    ? (S.oiHist[S.oiHist.length-1]-S.oiHist[S.oiHist.length-2]) -
      (S.oiHist[S.oiHist.length-2]-S.oiHist[S.oiHist.length-3])
    : 0;
  const oiDecelerating=oiAccel<0&&S.oiHist.length>=3;
  const oiFalling=oiTrend==='falling';

  const exSigs=[];
  if(rsiNow1h>70)   exSigs.push({t:`RSI ${rsiNow1h.toFixed(0)} — перекупленность`,w:2});
  if(rsiDiv)        exSigs.push({t:'RSI дивергенция: цена выше, RSI ниже',w:3});
  if(macdTurning)   exSigs.push({t:'MACD разворачивается вниз с хая',w:2});
  if(avgWick>1.2)   exSigs.push({t:`Верхние тени ×${avgWick.toFixed(1)} — давление продаж`,w:2});
  if(volFading)     exSigs.push({t:'Объём затухает после пампа',w:2});
  if(oiFalling)     exSigs.push({t:'OI падает — лонги сворачиваются',w:3});
  if(oiDecelerating)exSigs.push({t:'OI Acceleration < 0 — темп роста замедляется',w:2});
  if(frData&&frData>0.05) exSigs.push({t:`Funding ${frData.toFixed(3)}% — лонги перегреты`,w:2});
  if(cvdDiv)        exSigs.push({t:'CVD дивергенция: цена выше, дельта ниже',w:3});
  const exScore=exSigs.reduce((s,e)=>s+e.w,0);
  const isExhausted=exScore>=4;

  // 15m breakdown
  const e20_15m=ema(c15,20), e50_15m=ema(c15,50);
  const p15=c15[n15], e20_15n=e20_15m[n15], e50_15n=e50_15m[n15];
  const recentH=cds15m.slice(-6).map(c=>c.high);
  const lowerHighs=recentH[5]<recentH[4]&&recentH[4]<recentH[3];
  const brokeEma20=p15<e20_15n;
  const confirmedBelow=c15[n15]<e20_15m[n15]&&c15[n15-1]<(e20_15m[n15-1]||Infinity);

  const bkSigs=[];
  if(lowerHighs)     bkSigs.push({t:'Lower highs на 15m — слом структуры',w:3});
  if(brokeEma20)     bkSigs.push({t:'Пробой EMA20 на 15m',w:2});
  if(confirmedBelow) bkSigs.push({t:'Закрепление ниже EMA20 (2 свечи)',w:3});
  if(cvdFalling)     bkSigs.push({t:'CVD падает — агрессия покупателей иссякает',w:2});
  if(p15<e50_15n)    bkSigs.push({t:'Пробой EMA50 на 15m',w:2});
  const bkScore=bkSigs.reduce((s,e)=>s+e.w,0);
  const hasBreakdown=bkScore>=3;

  const totalScore=(isPumped?4:0)+(isOverheated?2:0)+exScore+bkScore;
  let phase=0;
  if(isPumped) phase=1;
  if(isPumped&&isExhausted) phase=2;
  if(isPumped&&isExhausted&&hasBreakdown) phase=3;
  const readyToShort=phase===3&&totalScore>=10;

  const atrv=atrCalc(cds15m);
  const entry=p15;
  const sl=entry+atrv*1.5;
  const tp1=Math.max(e20n||0,entry-atrv*2);
  const tp2=Math.max(e50n||0,entry-atrv*4);
  const rr=sl>entry?Math.abs(tp1-entry)/Math.abs(sl-entry):0;
  const impulseBase=Math.min(...cds1h.slice(-8).map(c=>c.open));

  return {
    phase,readyToShort,totalScore,pumpPct,pumpSpeed,atrRatio,
    distE20,volRatio,isPumped,isOverheated,exSigs,exScore,isExhausted,
    rsiNow1h,macdTurning,rsiDiv,avgWick,cvdDiv,oiDecelerating,
    bkSigs,bkScore,hasBreakdown,cvdFalling,
    entry,sl,tp1,tp2,rr,atrv,
    e20_1h:e20n,e50_1h:e50n,e20_15m:e20_15n,price15m:p15,
    impulseBase,cvdData:cvd15.slice(-80)
  };
}

// ═══════════════════════════════════════════════════════
//  QUICK SCORE FOR IDEAS SCAN (per-coin)
// ═══════════════════════════════════════════════════════
async function scoreForIdea(sym) {
  try {
    const [r1h, r15m, r4h] = await Promise.all([
      fetch(`${BINANCE}/klines?symbol=${sym}&interval=1h&limit=120`),
      fetch(`${BINANCE}/klines?symbol=${sym}&interval=15m&limit=80`),
      fetch(`${BINANCE}/klines?symbol=${sym}&interval=4h&limit=60`)
    ]);
    const [j1h, j15m, j4h] = await Promise.all([r1h.json(), r15m.json(), r4h.json()]);
    if (!Array.isArray(j1h)||j1h.length<50) return null;
    const parse = arr => arr.map(k=>({time:+k[0],open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}));
    const cds1h=parse(j1h), cds15m=Array.isArray(j15m)?parse(j15m):[], cds4h=Array.isArray(j4h)?parse(j4h):[];

    const c1h=cds1h.map(c=>c.close), v1h=cds1h.map(c=>c.volume);
    const n1h=cds1h.length-1;
    const e20=ema(c1h,20), e50=ema(c1h,50);
    const ve20=ema(v1h,20);
    const price=c1h[n1h], e20n=e20[n1h];

    // Pump metrics
    const pumpLow=Math.min(...cds1h.slice(-8).map(c=>c.low));
    const pumpPct=pumpLow>0?(price-pumpLow)/pumpLow*100:0;
    const dist=e20n?(price-e20n)/e20n*100:0;

    // Pump speed (last 2 candles)
    const p2low=Math.min(...cds1h.slice(-2).map(c=>c.low));
    const pumpSpeed=p2low>0?(price-p2low)/p2low*100:0;

    // ATR ratio vs historical
    const atrNow=atrCalc(cds1h);
    const atrHist=cds1h.length>20?atrCalc(cds1h.slice(0,-1)):atrNow;
    const atrRatio=atrHist>0?atrNow/atrHist:1;

    // Candle body ratio (directional strength)
    const lastC=cds1h[n1h];
    const bodyRatio=Math.abs(lastC.close-lastC.open)/(lastC.high-lastC.low||0.0001);

    const volRatio=ve20[n1h]?v1h[n1h]/ve20[n1h]:1;
    const rsiArr=rsi(c1h); const rsiNow=rsiArr[n1h];
    const {h}=macd(c1h);
    const hTurning=h[n1h]!=null&&h[n1h-1]!=null&&h[n1h]<h[n1h-1]&&h[n1h-1]>0;

    // CVD from 15m
    let cvdFalling=false, cvdDiv=false;
    if (cds15m.length>20) {
      const cvd15=cvdFromCandles(cds15m);
      cvdFalling=cvd15[cvd15.length-1]<cvd15[Math.max(0,cvd15.length-6)];
      const c15=cds15m.map(c=>c.close); const n15=cds15m.length-1;
      cvdDiv=c15[n15]>c15[n15-4]&&cvd15[cvd15.length-1]<cvd15[Math.max(0,n15-4)];
    }

    // 4h trend for context
    let trend4h='neutral';
    if (cds4h.length>=50) {
      const c4=cds4h.map(c=>c.close); const e50_4=ema(c4,50); const e200_4=ema(c4,200);
      const p4=c4[c4.length-1]; const e50n4=e50_4[e50_4.length-1]; const e200n4=e200_4[e200_4.length-1];
      if (e50n4&&e200n4) trend4h=p4>e50n4&&e50n4>e200n4?'bull':p4<e50n4&&e50n4<e200n4?'bear':'neutral';
    }

    // ── SHORT setup (Pump Exhaustion)
    const isSharpPump = pumpPct>=PUMP_THRESH && dist>=8;
    const exCount = (rsiNow>70?1:0)+(hTurning?1:0)+(cvdDiv?1:0)+(atrRatio>1.5?1:0);
    const bkCount = (cvdFalling?1:0);
    let shortConf=0, shortSigs=[];
    if (isSharpPump) {
      shortConf = 40 + pumpPct*0.8 + dist*0.6 + exCount*8 + bkCount*5;
      if (pumpSpeed>5) { shortConf+=8; shortSigs.push(`Скорость пампа: +${pumpSpeed.toFixed(1)}% за 2 свечи`); }
      if (rsiNow>70) shortSigs.push(`RSI ${rsiNow.toFixed(0)} — перекупленность`);
      if (hTurning) shortSigs.push('MACD разворачивается ↓');
      if (cvdDiv) shortSigs.push('CVD дивергенция — ослабление покупок');
      if (atrRatio>1.5) shortSigs.push(`ATR ×${atrRatio.toFixed(1)} — аномальная волатильность`);
      if (cvdFalling) shortSigs.push('CVD падает на 15m');
      shortConf = Math.min(94, shortConf);
    }

    // ── LONG setup (Pullback, Oversold)
    let longConf=0, longDir=null, longSigs=[];
    const e20_15m_arr = cds15m.length>20 ? ema(cds15m.map(c=>c.close),20) : [];
    const p15 = cds15m.length>0 ? cds15m[cds15m.length-1].close : price;
    const e20_15n = e20_15m_arr.length>0 ? e20_15m_arr[e20_15m_arr.length-1] : null;
    const crossedUp = e20_15n && p15>e20_15n && cds15m.length>1 && cds15m[cds15m.length-2].close < (e20_15m_arr[e20_15m_arr.length-2]||e20_15n);
    const rsi15=cds15m.length>20?rsi(cds15m.map(c=>c.close)):[];
    const rsiNow15=rsi15.length?rsi15[rsi15.length-1]:50;

    // Taker proxy: bull candle body ratio
    const takerProxy=bodyRatio>0.6; // >60% directional

    if (trend4h==='bull' && crossedUp && rsiNow15>45 && !cvdFalling) {
      longConf = 48 + (takerProxy?8:0) + (!cvdFalling?5:0) + (rsiNow15<60?4:0);
      longSigs.push('15m EMA20 пересечена снизу вверх');
      if (!cvdFalling) longSigs.push('CVD ↑ — покупатели активны');
      if (takerProxy) longSigs.push(`Body ratio ${(bodyRatio*100).toFixed(0)}% — направленное движение`);
      if (trend4h==='bull') longSigs.push('4h тренд восходящий');
      longConf = Math.min(88, longConf);
      longDir = 'LONG';
    } else if (rsiNow<30 && rsiNow15<32) {
      longConf = 45 + (hTurning?6:0) + (!cvdFalling?5:0);
      longSigs.push(`RSI 1h: ${rsiNow.toFixed(0)} — перепроданность`);
      if (!cvdFalling) longSigs.push('CVD не падает');
      longConf = Math.min(78, longConf);
      longDir = 'LONG';
    } else if (volRatio>2.5 && bodyRatio>0.65 && rsiNow>50 && rsiNow<72) {
      longConf = 46 + volRatio*3 + (trend4h==='bull'?8:0);
      longSigs.push(`Volume Breakout: ×${volRatio.toFixed(1)}`);
      longSigs.push(`Body ratio ${(bodyRatio*100).toFixed(0)}% — чистое движение`);
      if (trend4h==='bull') longSigs.push('4h тренд поддерживает');
      longConf = Math.min(82, longConf);
      longDir = 'LONG';
    }

    // EARLY PUMP: +5-15% speed, vol spike, RSI not yet overbought
    const isEarlyPump = pumpSpeed>=5 && pumpSpeed<PUMP_THRESH && volRatio>=2 && rsiNow>50 && rsiNow<78;
    if (isEarlyPump && longConf < 50) {
      longConf = Math.min(75, 44 + pumpSpeed*1.5 + volRatio*2);
      longDir = 'LONG';
      longSigs = ['🚀 Зарождающийся памп: +'+pumpSpeed.toFixed(1)+'% за 2ч', 'Vol×'+volRatio.toFixed(1)+' выше нормы', 'RSI '+rsiNow.toFixed(0)+' — ещё не перекуплен'];
    }

    // TREND REVERSAL: price crossed EMA50 after downtrend
    const e50arr = ema(c1h, 50);
    const e50now = e50arr[n1h] || 0;
    const e50prev3 = e50arr[Math.max(0, n1h-3)] || 0;
    const wasBelowE50 = cds1h.slice(Math.max(0,n1h-5), n1h).every(c => c.close < e50now);
    const nowAboveE50 = price > e50now && (cds1h[n1h-1]?.close || price) < e50prev3;
    if (nowAboveE50 && wasBelowE50 && volRatio > 1.4 && longConf < 55) {
      longConf = Math.min(80, 52 + volRatio*3 + (trend4h==='bull'?10:0));
      longDir = 'LONG';
      longSigs = ['🔄 Разворот: пробой EMA50 после снижения', 'Vol×'+volRatio.toFixed(1)+' подтверждает', 'Body ratio '+(bodyRatio*100).toFixed(0)+'%'];
    }

    // ACTIVE PUMP 24H: +15%+ in 24h candles, price still pumping
    const nBack24 = Math.min(24, n1h);
    const price24hAgo = c1h[Math.max(0, n1h - nBack24)] || price;
    const pump24pct = price24hAgo > 0 ? (price - price24hAgo) / price24hAgo * 100 : 0;
    const isActivePump24 = pump24pct >= 15 && dist >= 5 && !isSharpPump;
    if (isActivePump24 && shortConf < 50) {
      shortConf = Math.min(78, 48 + pump24pct*0.5 + dist*0.4 + (cvdFalling?8:0));
      shortSigs = ['🔥 Активный памп +'+pump24pct.toFixed(1)+'% за 24ч', 'EMA20 dist: +'+dist.toFixed(1)+'%', cvdFalling?'CVD начинает падать':'Объём стабилен'];
    }

    // NEW PUMP detection (separate signal type)
    const isNewPump = pumpPct>=PUMP_THRESH && pumpSpeed>=5 && volRatio>=1.5;

    const result = {
      sym, cds1h, cds15m, cds4h, price, pumpPct, pumpSpeed, dist,
      atrRatio, volRatio, rsiNow, bodyRatio, trend4h,
      shortConf, shortSigs, longConf, longDir, longSigs,
      isSharpPump, isNewPump, cvdFalling, cvdDiv
    };

    // Compute entry/sl/tp for best signal
    const atrv=atrCalc(cds15m.length>14?cds15m:cds1h);
    if (shortConf>=MIN_CONF && shortConf>longConf) {
      const entry=p15, sl=entry+atrv*1.5;
      const tp1=Math.max(e20[n1h]||0,entry-atrv*2);
      const tp2=Math.max(e50[n1h]||0,entry-atrv*4);
      result.bestDir='SHORT'; result.bestConf=shortConf; result.bestSigs=shortSigs;
      result.entry=entry; result.sl=sl; result.tp1=tp1; result.tp2=tp2;
      result.rr=sl>entry?Math.abs(tp1-entry)/Math.abs(sl-entry):0;
      result.atrv=atrv;
      result.why=`+${pumpPct.toFixed(1)}% за 8ч, ${dist.toFixed(1)}% от EMA20. ${shortSigs.slice(0,2).join(', ')}.`;
    } else if (longConf>=MIN_CONF && longConf>=shortConf && longDir) {
      const entry=p15, sl=entry-atrv*1.5;
      const tp1=entry+atrv*2;
      const tp2=entry+atrv*4;
      result.bestDir='LONG'; result.bestConf=longConf; result.bestSigs=longSigs;
      result.entry=entry; result.sl=sl; result.tp1=tp1; result.tp2=tp2;
      result.rr=Math.abs(tp1-entry)/Math.abs(sl-entry);
      result.atrv=atrv;
      result.why=`${longSigs.slice(0,2).join(', ')}. Тренд 4h: ${trend4h}.`;
    }

    if (isNewPump) {
      result.isPumpSignal=true;
      if (!result.bestDir) {
        result.bestDir='ПАМП'; result.bestConf=Math.min(95,50+pumpPct+volRatio*5);
        result.bestSigs=[`+${pumpPct.toFixed(1)}% за 8h`,`скорость +${pumpSpeed.toFixed(1)}%/2ч`,`Vol×${volRatio.toFixed(1)}`,`RSI ${rsiNow.toFixed(0)}`];
        result.why=`Резкий памп: +${pumpPct.toFixed(1)}% за 8ч, скорость +${pumpSpeed.toFixed(1)}% за 2 свечи, объём ×${volRatio.toFixed(1)}.`;
        result.entry=price; result.sl=price*(1-atrv/price*2); result.tp1=0; result.tp2=0; result.rr=0; result.atrv=atrv;
      }
    }

    return result;
  } catch(e) { return null; }
}

// ═══════════════════════════════════════════════════════
//  IDEAS AGENT — main scan loop
// ═══════════════════════════════════════════════════════
async function runIdeas(manual=false) {
  if (S.scanning && !manual) return;
  S.scanning=true;
  setStatus('SCANNING...','scanning');
  document.getElementById('scanner-label').textContent='⏳ Сканирую...';

  try {
    // 1. Get top volatile coins from Binance futures
    const r = await fetch(`${FAPI}/ticker/24hr`);
    const tickers = await r.json();
    if (!Array.isArray(tickers)) throw new Error('bad tickers');

    // Score for volatility
    const candidates = tickers
      .filter(t=>t.symbol.endsWith('USDT')&&!t.symbol.includes('_'))
      .map(t=>({
        sym:t.symbol,
        chgPct:Math.abs(+t.priceChangePercent),
        vol:+t.quoteVolume,
        hlRatio:(+t.highPrice-+t.lowPrice)/(+t.lowPrice||1)*100,
        volScore:Math.abs(+t.priceChangePercent)*2+(+t.quoteVolume>50e6?3:+t.quoteVolume>10e6?1:0)+(+t.priceChangePercent>15?3:+t.priceChangePercent>8?1:0)
      }))
      .filter(t=>t.vol>2e6)
      .sort((a,b)=>b.volScore-a.volScore)
      .slice(0,200);

    // 2. Analyze in batches
    const newIdeas=[];
    const now=Date.now();
    const batchSize=10;
    for (let i=0; i<Math.min(candidates.length,60); i+=batchSize) {
      const batch=candidates.slice(i,i+batchSize);
      const results=await Promise.all(batch.map(c=>scoreForIdea(c.sym)));
      results.forEach(res=>{
        if (!res||!res.bestDir) return;
        if (res.bestConf<MIN_CONF) return;
        // Price-based dedup: skip if same sym analyzed <1h ago AND price similar
        const lastTs=S.ideaDedup[res.sym];
        if (lastTs && now-lastTs<IDEA_TTL) return;
        S.ideaDedup[res.sym]=now;
        newIdeas.push({
          sym:res.sym, dir:res.bestDir, conf:res.bestConf,
          sigs:res.bestSigs, why:res.why,
          entry:res.entry, sl:res.sl, tp1:res.tp1, tp2:res.tp2,
          rr:res.rr, atrv:res.atrv,
          pumpPct:res.pumpPct, pumpSpeed:res.pumpSpeed,
          dist:res.dist, volRatio:res.volRatio, rsiNow:res.rsiNow,
          atrRatio:res.atrRatio, bodyRatio:res.bodyRatio,
          trend4h:res.trend4h, cvdFalling:res.cvdFalling, cvdDiv:res.cvdDiv,
          isPump:res.isPumpSignal,
          ts:now, result:null,
          // For AI reasoning
          cds1h:res.cds1h, cds15m:res.cds15m
        });
      });
      document.getElementById('scanner-label').textContent=`⏳ ${Math.min(i+batchSize,60)}/60...`;
    }

    // Sort: pumps first, then by conf
    newIdeas.sort((a,b)=>{
      if (a.isPump&&!b.isPump) return -1;
      if (!a.isPump&&b.isPump) return 1;
      return b.conf-a.conf;
    });

    // 3. AI reasoning for top 5
    const top=newIdeas.slice(0,5);
    for (const idea of top) {
      idea.reasoning = await getIdeaReasoning(idea);
    }

    // Merge with existing (keep non-stale old ones)
    const staleThresh=now-IDEA_TTL;
    S.ideas=[...newIdeas,...S.ideas.filter(old=>old.ts>staleThresh&&!newIdeas.find(n=>n.sym===old.sym))];
    // Mark stale by price movement
    S.ideas.forEach(idea=>{
      const livePrice=S.prices[idea.sym]?.price;
      if (livePrice&&idea.entry&&idea.atrv) {
        const priceDist=Math.abs(livePrice-idea.entry)/idea.atrv;
        if (priceDist>IDEA_PRICE_TTL) idea.stale=true;
      }
      if (now-idea.ts>IDEA_TTL) idea.stale=true;
    });
    S.ideas=S.ideas.filter(i=>!i.stale).slice(0,15);

    // Pump alert for new sharp pumps
    const hotPumps=newIdeas.filter(i=>i.isPump&&i.pumpPct>=PUMP_THRESH);
    if (hotPumps.length>0) {
      const hp=hotPumps[0];
      const alertEl=document.getElementById('pump-alert');
      document.getElementById('pump-alert-text').innerHTML=
        `🔥 НОВЫЙ ПАМП · <b>${hp.sym.replace('USDT','')}</b> +${hp.pumpPct.toFixed(1)}% за 8ч · скорость +${hp.pumpSpeed.toFixed(1)}%/2ч · Vol×${hp.volRatio.toFixed(1)} · RSI ${hp.rsiNow.toFixed(0)}`;
      alertEl.style.display='flex';
      notify('🔥 Новый памп!',`${hp.sym} +${hp.pumpPct.toFixed(0)}%`);
    }

    // Schedule winrate checks for new ideas
    newIdeas.forEach(idea=>{
      if (idea.entry&&idea.tp1&&idea.sl) {
        scheduleWinrateCheck(idea);
      }
    });

    renderIdeas();
    renderVolatility(candidates.slice(0,10));

  } catch(e) {
    console.warn('Ideas scan failed:',e);
  }

  S.scanning=false;
  document.getElementById('scanner-label').textContent='💡 Идеи агента';
  setStatus('LIVE','live');
}

async function getIdeaReasoning(idea) {
  const prompt=`Ты — трейдер. Дай краткое обоснование сетапа (3 предложения max):

Монета: ${idea.sym} | ${idea.dir} | ${idea.conf.toFixed(0)}/100
Тренд 4h: ${idea.trend4h}
Памп: +${idea.pumpPct.toFixed(1)}%, скорость +${idea.pumpSpeed.toFixed(1)}%/2ч
Dist EMA20: ${idea.dist.toFixed(1)}% | ATR ratio: ×${idea.atrRatio.toFixed(2)}
Vol ratio: ×${idea.volRatio.toFixed(1)} | RSI: ${idea.rsiNow.toFixed(0)}
Body ratio: ${(idea.bodyRatio*100).toFixed(0)}% | CVD: ${idea.cvdFalling?'↓':'↑'}${idea.cvdDiv?' (дивергенция)':''}
Сигналы: ${idea.sigs.join('; ')}

1) Что происходит с монетой
2) Почему это ${idea.dir} момент  
3) На что смотреть при входе
Русский, по делу, без воды.`;
  try {

    return text || '';
  } catch { return ''; }
}

// ═══════════════════════════════════════════════════════
const MEMORY_KEY='pf_winrates_v1';
function loadWR(){try{return JSON.parse(localStorage.getItem(MEMORY_KEY)||'[]');}catch{return[];}}
function saveWR(){try{localStorage.setItem(MEMORY_KEY,JSON.stringify(S.winrates));}catch{}}
S.winrates=loadWR();

function scheduleWinrateCheck(idea){
  const checks=[4,8,24]; // hours
  checks.forEach(h=>{
    setTimeout(async()=>{
      const lp=await fetchPrice(idea.sym);
      if (!lp) return;
      let result='pending';
      if (idea.dir==='SHORT') {
        if (lp<=idea.tp1) result='win';
        else if (lp>=idea.sl) result='loss';
      } else if (idea.dir==='LONG') {
        if (lp>=idea.tp1) result='win';
        else if (lp<=idea.sl) result='loss';
      }
      if (result!=='pending') {
        const existing=S.winrates.find(w=>w.sym===idea.sym&&w.ts===idea.ts);
        if (!existing||existing.result==='pending') {
          if (existing) existing.result=result;
          else S.winrates.unshift({sym:idea.sym,dir:idea.dir,entry:idea.entry,tp:idea.tp1,sl:idea.sl,ts:idea.ts,result,checkedAt:Date.now(),checkHours:h});
          saveWR(); renderWinrates();
          if (result==='win') notify(`✅ TP достигнут — ${idea.sym.replace('USDT','')}`,`+${Math.abs((lp-idea.entry)/idea.entry*100).toFixed(1)}%`);
        }
      }
    }, h*3600*1000);
  });
}

async function fetchPrice(sym){
  try{const r=await fetch(`${BINANCE}/ticker/price?symbol=${sym}`);const j=await r.json();return +j.price;}catch{return null;}
}

function renderWinrates(){
  const wins=S.winrates.filter(w=>w.result==='win').length;
  const total=S.winrates.filter(w=>w.result!=='pending').length;
  const wr=total>0?(wins/total*100).toFixed(0):0;
  // Update winrate display in phase content if active
  if (S.phase===5) renderPhaseContent();
}

function setIdeaTab(tab, btn) {
  activeIdeaTab = tab;
  document.querySelectorAll('.itab').forEach(b => {
    b.classList.remove('active');
    b.style.borderBottom = '2px solid transparent';

function categorizeIdea(idea) {
  const dir = idea.dir;
  const sigs = (idea.sigs || []).join(' ');
  // PUMP category: pump exhaustion shorts + active/new pumps
  if (dir === 'SHORT' || dir === 'ПАМП' || idea.isPump ||
      sigs.includes('памп') || sigs.includes('Памп') || sigs.includes('Pump')) return 'pump';
  // BOUNCE category: oversold, RSI<30, pullback
  if (sigs.includes('перепроданн') || sigs.includes('RSI') && idea.rsiNow < 38 ||
      sigs.includes('Oversold') || sigs.includes('отскок')) return 'bounce';
  // REVERSAL category: trend reversal, EMA50 cross, early pump longs
  if (sigs.includes('Разворот') || sigs.includes('EMA50') || sigs.includes('Зарождающ') ||
      sigs.includes('Volume Breakout') || sigs.includes('пересечена')) return 'reversal';
  // Default: longs go to reversal, shorts go to pump
  return dir === 'LONG' ? 'reversal' : 'pump';
}

function updateIdeaBadges() {
  const counts = {pump:0, reversal:0, bounce:0};
  S.ideas.forEach(idea => { const cat = categorizeIdea(idea); if (counts[cat] !== undefined) counts[cat]++; });
  ['pump','reversal','bounce'].forEach(tab => {
    const btn = document.getElementById('itab-' + tab);
    if (!btn) return;
    const label = {pump:'🔥 Пампы', reversal:'🔄 Развороты', bounce:'📉 Отскоки'}[tab];
    const n = counts[tab];
    btn.innerHTML = label + (n > 0 ? ` <span class="itab-badge" style="background:${n>0?'var(--red-bg)':'var(--s3)'};color:${n>0?'var(--red)':'var(--muted)'};">${n}</span>` : '');
  });
  const total = S.ideas.length;
  const cntEl = document.getElementById('ideas-count');
  if (cntEl) cntEl.textContent = total > 0 ? `${total} идей` : '';
}

async function loadSym(sym, idea=null){
  S.sym=sym;
  document.getElementById('sym-label').textContent=sym.replace('USDT','');
  document.getElementById('ctf1h').textContent=`1H · ${sym.replace('USDT','')}`;
  document.getElementById('ctf15m').textContent=`15M · ${sym.replace('USDT','')}`;
  document.getElementById('futures-title').textContent=`Фьючерсы · ${sym.replace('USDT','')}`;

  // Load candles if not passed from idea
  const [c1h,c15m] = await Promise.all([
    idea?.cds1h || fetchCds(sym,'1h',120),
    idea?.cds15m || fetchCds(sym,'15m',80)
  ]);
  S.cds1h=c1h; S.cds15m=c15m;
  await fetchFutures(sym);

  // Compute CVD
  S.cvdData=cvdFromCandles(S.cds15m.slice(-80));

  // Full analysis
  S.analysis=analyzeFull(S.cds1h,S.cds15m,S.cds4h,
    S.oiHist.length>2?(S.oiHist[S.oiHist.length-1]<S.oiHist[S.oiHist.length-3]?'falling':'rising'):'unknown',
    S.fr);

  // Draw everything
  redrawAllCharts();

  // Update labels
  const a=S.analysis;
  if (a) {
    document.getElementById('pump-label').textContent=
      `${a.isPumped?'🔴':'📊'} +${a.pumpPct.toFixed(1)}% · ${a.distE20.toFixed(1)}% от EMA20`;
    document.getElementById('pump-label').style.color=a.isPumped?'var(--red)':a.pumpPct>PUMP_THRESH/2?'var(--orange)':'var(--muted)';
    document.getElementById('entry-lines-label').style.display=a.readyToShort?'flex':'none';
    document.getElementById('entry-badge').style.display=a.readyToShort?'inline-block':'none';
    // CVD label
    const cvdFall=S.cvdData.length>10&&S.cvdData[S.cvdData.length-1]<S.cvdData[Math.max(0,S.cvdData.length-10)];
    document.getElementById('cvd-label').textContent=cvdFall?'↓ медвежий':'↑ бычий';
    document.getElementById('cvd-label').style.color=cvdFall?'var(--red)':'var(--green)';
    document.getElementById('cvd-trend').textContent=cvdFall?'↓ МЕДВЕЖИЙ':'↑ БЫЧИЙ';
    document.getElementById('cvd-trend').style.color=cvdFall?'var(--red)':'var(--green)';
    document.getElementById('cvd-div').textContent=a.cvdDiv?'⚠ Дивергенция':'Нет';
    document.getElementById('cvd-div').style.color=a.cvdDiv?'var(--red)':'var(--muted)';
    // OI accel
    const oiAccelEl=document.getElementById('oi-accel');
    if (a.oiDecelerating) {oiAccelEl.textContent='↓ замедляется';oiAccelEl.style.color='var(--green)';}
    else {oiAccelEl.textContent='↑ нарастает';oiAccelEl.style.color='var(--red)';}
  }

  // Update phase & content
  if (a) {
    setPhase(Math.max(1,a.phase));
  }

  // Show idea detail if passed
  if (idea) renderIdeaDetail(idea);
  else renderSignalCard();

  renderFutures();
}

    const pend=S.winrates.filter(w=>w.result==='pending').length;
    const total=wins+losses;
    const wr=total>0?(wins/total*100).toFixed(0):0;
    el.innerHTML=`<div class="fade">
      <div class="wr-grid">
        <div class="wr-box"><div class="wr-v" style="color:var(--green);">${wr}%</div><div class="wr-l">WR</div></div>
        <div class="wr-box"><div class="wr-v" style="color:var(--green);">${wins}</div><div class="wr-l">TP</div></div>
        <div class="wr-box"><div class="wr-v" style="color:var(--red);">${losses}</div><div class="wr-l">SL</div></div>
      </div>
      <div style="height:5px;background:var(--s3);border-radius:3px;margin-bottom:4px;"><div style="height:100%;width:${wr}%;background:linear-gradient(90deg,var(--green),#4ade80);border-radius:3px;"></div></div>

        </div>`).join('')}
    </div>`;
    return;
  }

  if (S.phase===6) { // АГЕНТ
    el.innerHTML=`<div class="fade">
      <div style="font-size:9px;color:var(--orange);letter-spacing:1px;font-weight:700;margin-bottom:6px;text-transform:uppercase;padding-bottom:4px;border-bottom:1px solid var(--border);">Приоритеты агента</div>

        <div onclick="selectIdea(${i})" style="cursor:pointer;padding:5px 7px;border-radius:3px;margin-bottom:3px;background:${S.activeIdea===i?'var(--red-bg)':'var(--s1)'};border:1px solid ${S.activeIdea===i?'var(--red)':'var(--border)'};display:flex;align-items:center;gap:6px;font-size:11px;">

  if (S.phase===7) { // ЧАТ - handled by right panel
    el.innerHTML='<div style="font-size:11px;color:var(--muted);">Чат доступен в правой панели →</div>';

  }

  // Phases 1-4: analysis
  if (!a) { el.innerHTML='<div style="font-size:11px;color:var(--muted);">Загрузка данных...</div>'; return; }

  const phaseColors=[,'var(--orange)','var(--amber)','var(--red)','var(--green)'];

  ${S.phase===4?`

      <div style="font-family:var(--mono);font-size:14px;font-weight:800;color:var(--red);margin-bottom:5px;">▼ SHORT СИГНАЛ</div>
      <div style="font-size:9px;color:var(--dim);margin-bottom:8px;">Все 3 фазы · score ${a.totalScore} · ATR×${a.atrRatio.toFixed(2)}</div>
      ${[['ENTRY','$'+fmt(a.entry),'var(--text)'],['STOP','$'+fmt(a.sl),'var(--red)'],['TP1 EMA20','$'+fmt(a.tp1),'var(--green)'],['TP2 EMA50','$'+fmt(a.tp2),'var(--green)'],['R/R','1:'+a.rr.toFixed(2),'var(--sky)'],['ATR%',(a.atrv/a.entry*100).toFixed(2)+'%','var(--muted)']].map(([k,v,c])=>`

async function fetchFutures(sym){
  try{const r=await fetch(`${FAPI}/openInterest?symbol=${sym}`);const j=await r.json();if(j.openInterest)S.oi=+j.openInterest;}catch{S.oi=null;}
  try{const r=await fetch(`${FAPI}/fundingRate?symbol=${sym}&limit=1`);const j=await r.json();if(Array.isArray(j)&&j[0])S.fr=+j[0].fundingRate*100;}catch{S.fr=null;}
  try{const r=await fetch(`${FAPI}/openInterestHist?symbol=${sym}&period=1h&limit=8`);const j=await r.json();if(Array.isArray(j))S.oiHist=j.map(o=>+o.sumOpenInterest);}catch{S.oiHist=[];}
  renderFutures();
}

function renderFutures(){
  const oiTrend=S.oiHist.length>2?(S.oiHist[S.oiHist.length-1]<S.oiHist[S.oiHist.length-3]?'↓ падает':'↑ растёт'):'—';
  const oiTrendCol=S.oiHist.length>2?(S.oiHist[S.oiHist.length-1]<S.oiHist[S.oiHist.length-3]?'var(--green)':'var(--red)'):'var(--dim)';
  const frEl=document.getElementById('fr-val');
  if(frEl){frEl.textContent=S.fr!=null?`${S.fr>0?'+':''}${S.fr.toFixed(4)}%`:'—';frEl.style.color=S.fr!=null?(S.fr>0?'var(--red)':'var(--green)'):'var(--dim)';}
  const oiEl=document.getElementById('oi-val');
  if(oiEl){oiEl.textContent=S.oi!=null?fmt(S.oi)+' контр':'—';oiEl.style.color='var(--sky)';}
  const oiTEl=document.getElementById('oi-trend');
  if(oiTEl){oiTEl.textContent=oiTrend;oiTEl.style.color=oiTrendCol;}
  const warn=document.getElementById('fr-warn');
  if(warn){
    if(S.fr!=null&&Math.abs(S.fr)>0.05){
      warn.style.display='block';
      warn.textContent=S.fr>0?'⚠ Лонги перегреты — фаворизирует шорт':'⚠ Шорты перегреты';
      warn.style.color=S.fr>0?'var(--red)':'var(--green)';
      warn.style.background=S.fr>0?'var(--red-bg)':'var(--green-bg)';
    } else warn.style.display='none';
  }
}

// ═══════════════════════════════════════════════════════
//  WEBSOCKET PRICES
// ═══════════════════════════════════════════════════════
function connectWS(){
  const topSyms=['SOLUSDT','AVAXUSDT','INJUSDT','SUIUSDT','ARBUSDT','OPUSDT','WIFUSDT','NEARUSDT','APTUSDT','FETUSDT','LINKUSDT','DOTUSDT','RUNEUSDT','LDOUSDT','STXUSDT','ORDIUSDT','PENDLEUSDT','ENAUSDT','MATICUSDT','SEIUSDT'];
  const streams=topSyms.map(s=>`${s.toLowerCase()}@miniTicker`).join('/');
  let ws,retries=0;
  const connect=()=>{
    ws=new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);
    ws.onopen=()=>{S.wsOk=true;setStatus('LIVE','live');};
    ws.onmessage=e=>{
      try{const{data:d}=JSON.parse(e.data);if(d){S.prices[d.s]={price:+d.c,change:+d.P};S.lastPoll=Date.now();updateTopbar();}}catch{}
    };
    ws.onclose=()=>{S.wsOk=false;if(retries<5){setTimeout(connect,3000);retries++;}};
    ws.onerror=()=>{S.wsOk=false;};
  };
  connect();
}

function checkPositionAlerts(){
  S.positions.forEach(pos=>{
    const lp=S.prices[pos.sym]?.price; if(!lp) return;
    const pnl=pos.dir==='SHORT'?(pos.entry-lp)/pos.entry*100:(lp-pos.entry)/pos.entry*100;
    const slD=Math.abs(lp-pos.sl)/Math.abs(pos.entry-pos.sl);
    const alertEl=document.getElementById('alert-bar');
    if(slD<0.08){
      alertEl.style.display='flex';alertEl.style.background='var(--red-bg)';alertEl.style.borderBottomColor='var(--red)';alertEl.className='blink';
      alertEl.innerHTML=`🚨 СТОП-ЛОСС! ${pos.sym} PnL: ${pnl.toFixed(2)}%<button onclick="S.positions=S.positions.filter(p=>p.sym!=='${pos.sym}');document.getElementById('alert-bar').style.display='none';" style="margin-left:auto;background:var(--red);color:white;border:none;border-radius:3px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:inherit;">✕</button>`;
      notify('🚨 СТОП-ЛОСС',pos.sym);
    } else if((pos.dir==='SHORT'&&lp<=pos.tp1)||(pos.dir==='LONG'&&lp>=pos.tp1)){
      alertEl.style.display='flex';alertEl.style.background='var(--green-bg)';alertEl.style.borderBottomColor='var(--green)';alertEl.className='';
      alertEl.innerHTML=`✅ TP1 достигнут! ${pos.sym} +${Math.abs(pnl).toFixed(2)}%`;
    }
  });
}

let chatHistory=[];
function buildContext(){
  const a=S.analysis; const lp=S.prices[S.sym]?.price;
  const oiTrend=S.oiHist.length>2?(S.oiHist[S.oiHist.length-1]<S.oiHist[S.oiHist.length-3]?'falling':'rising'):'unknown';
  const cvdFall=S.cvdData.length>10&&S.cvdData[S.cvdData.length-1]<S.cvdData[Math.max(0,S.cvdData.length-10)];
  let ctx=`[ДАННЫЕ · ${new Date().toLocaleTimeString()}]\nМонета: ${S.sym} | Цена: $${fmt(lp)}\n`;
  if(a){ctx+=`Памп: +${a.pumpPct.toFixed(1)}% · скорость +${a.pumpSpeed.toFixed(1)}%/2ч\nEMA20 dist: ${a.distE20.toFixed(1)}% | ATR×${a.atrRatio.toFixed(2)}\nФаза: ${a.phase}/3 | ${a.readyToShort?'✅ СИГНАЛ':'⏳ Ждём'}\nCVD: ${cvdFall?'↓ медвежий':'↑ бычий'}${a.cvdDiv?' (дивергенция)':''} | OI: ${oiTrend} | Funding: ${S.fr!=null?(S.fr>0?'+':'')+S.fr.toFixed(4)+'%':'—'}\n`;}
  if(S.positions.length){
    const pos=S.positions[0]; const lp2=S.prices[pos.sym]?.price||pos.entry;
    const pnl=pos.dir==='SHORT'?(pos.entry-lp2)/pos.entry*100:(lp2-pos.entry)/pos.entry*100;
    ctx+=`\n[ПОЗИЦИЯ] ${pos.dir} ${pos.sym} | Вход $${fmt(pos.entry)} | Сейчас $${fmt(lp2)} | PnL ${pnl>=0?'+':''}${pnl.toFixed(2)}% | SL $${fmt(pos.sl)} | TP $${fmt(pos.tp1)}`;
  }
  return ctx;
}
async function sendChat(userMsg){
  const inp=document.getElementById('chat-input');
  const msg=userMsg||inp.value.trim(); if(!msg) return;
  if(!userMsg) inp.value='';
  appendMsg('user',msg);
  const tid='t'+Date.now();
  appendThinking(tid);
  try {
    // Check key
    if (!getApiKey()) {
      document.getElementById(tid)?.remove();
      appendMsg('ai','⚠️ Нужен Gemini API ключ.\n\nНажмите кнопку 🔑 Подключить AI в топбаре.\nКлюч бесплатно: aistudio.google.com → Get API Key');
      return;
    }

    const ctx = buildContext();

    // Detect coin ticker in message
    const coinMatch = msg.match(/^([A-Z]{2,10})(USDT?)?\s*[?!]?$/i) ||
                      msg.match(/(?:анализ|посмотри|проверь|что с|как там|расскажи про)\s+([A-Z]{2,10})/i);

    let extraCtx = '';
    if (coinMatch) {
      let sym = (coinMatch[1]||'').toUpperCase();
      if (!sym.endsWith('USDT')) sym += 'USDT';
      try {
        const res = await scoreForIdea(sym);
        if (res) {
          extraCtx = `\n\n[ТЕХНИЧЕСКИЕ ДАННЫЕ ${sym}]` +
            `\nЦена: $${fmt(res.price)} | Памп 8h: +${res.pumpPct.toFixed(1)}% | Скорость: +${res.pumpSpeed.toFixed(1)}%/2ч` +
            `\nEMA20 dist: ${res.dist.toFixed(1)}% | ATR×${res.atrRatio.toFixed(2)} | Vol×${res.volRatio.toFixed(1)}` +
            `\nRSI: ${res.rsiNow.toFixed(0)} | CVD: ${res.cvdFalling?'↓ медвежий':'↑ бычий'}${res.cvdDiv?' + дивергенция':''}` +
            `\nТренд 4h: ${res.trend4h} | Body ratio: ${(res.bodyRatio*100).toFixed(0)}%` +
            `\nАгент: ${res.bestDir||'нет сетапа'} (${res.bestConf?.toFixed(0)||0}/100)` +
            (res.bestSigs?.length ? `\nСигналы: ${res.bestSigs.join('; ')}` : '');
        }
      } catch(e2) { /* ignore, just use base ctx */ }
    }

    const histCtx = chatHistory.slice(-4).map(m=>`${m.role}: ${m.content.substring(0,120)}`).join('\n');
    const fullPrompt = ctx + extraCtx +
      (histCtx ? `\n\n[История чата]\n${histCtx}` : '') +
      `\n\n---\nВопрос трейдера: ${msg}`;

    const reply = await callGemini(fullPrompt, 500);

    document.getElementById(tid)?.remove();

    if (!reply) {
      appendMsg('ai', '⚠️ Gemini не вернул ответ. Проверьте API ключ.');
      return;
    }

    appendMsg('ai', reply);
    chatHistory.push({role:'user',content:msg}, {role:'assistant',content:reply});
    if (chatHistory.length > 12) chatHistory = chatHistory.slice(-12);

  } catch(e) {
    document.getElementById(tid)?.remove();

const GEMINI_MODEL = 'gemini-2.0-flash';

function getApiKey() {
  return localStorage.getItem('gemini_api_key') || '';
}

function promptApiKey() {
  const current = getApiKey();
  const key = prompt(
    'Введите Google Gemini API ключ\n' +
    '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n' +
    '1. Откройте: aistudio.google.com\n' +
    '2. Нажмите: Get API Key → Create API Key\n' +
    '3. Скопируйте и вставьте сюда\n\n' +
    'Бесплатно: 60 запросов/мин, без лимита по токенам',
    current
  );
  if (key && key.length > 20) {
    localStorage.setItem('gemini_api_key', key.trim());
    showToast('✓ Gemini AI подключён');
    // Remove the pulsing button
    const btn = document.getElementById('api-key-btn');
    if (btn) { btn.style.animation='none'; btn.style.color='#94a3b8'; btn.style.borderColor='#334155'; btn.textContent='🔑 Gemini'; }
  } else if (key !== null) {
    alert('Ключ слишком короткий. Получите на aistudio.google.com');
  }
}

async function callGemini(prompt, maxTokens=400) {
  const key = getApiKey();
  if (!key) return null;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;
  const body = {
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: { maxOutputTokens: maxTokens, temperature: 0.4 },
    systemInstruction: {
      parts: [{ text: 'Ты — персональный AI советник трейдера. Стратегии: Pump Exhaustion Reversion, разворот тренда, отскоки от перепроданности.\nОтвечай кратко (3-5 предложений), конкретно, на русском. Говори прямо: входить/не входить, держать/закрывать.\nЕсли тебя просят проанализировать монету — дай оценку тренда, ключевых уровней, рекомендацию по направлению.' }]
    }
  };
  const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (!r.ok) {
    const err = await r.json().catch(()=>({}));
    const msg = err?.error?.message || `HTTP ${r.status}`;
    if (r.status === 400 && msg.includes('API_KEY')) throw new Error('Неверный API ключ. Проверьте на aistudio.google.com');
    if (r.status === 429) throw new Error('Превышен лимит запросов. Подождите минуту.');
    throw new Error(msg);
  }
  const data = await r.json();
  return data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

function checkApiKey() {
  const tb = document.getElementById('topbar');
  const divider = tb.querySelector('.tdiv:last-of-type');
  const btn = document.createElement('button');
  btn.id = 'api-key-btn';
  btn.className = 'top-btn';
  btn.onclick = promptApiKey;
  if (!getApiKey()) {
    btn.style.cssText = 'background:rgba(74,222,128,.12);border-color:#4ade80;color:#4ade80;animation:pulse .8s infinite;';
    btn.textContent = '🔑 Подключить AI';
  } else {
    btn.style.cssText = 'color:#4ade80;border-color:#334155;';
    btn.textContent = '✦ Gemini AI';
  }
  if (divider) tb.insertBefore(btn, divider);
  else tb.appendChild(btn);
}
